server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # TanStack Router handles routing client-side, so any path that isn't
    # a real file (e.g. /library/42) must still be served index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
